<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking — Tabs Vacilio | Schedule Your Tattoo</title>
  <meta name="description" content="Book a tattoo session with Tabs Vacilio in Houston, TX. Custom anime pieces, flash deals, and consultations available.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
<style>
  .ref-upload { margin-top: 8px; }
  .ref-upload-label { display: inline-block; padding: 8px 16px; background: transparent; border: 1px dashed var(--divider, #333); color: var(--muted, #999); font-size: 0.8rem; border-radius: 6px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .ref-upload-label:hover { border-color: var(--accent, #C9A84C); color: var(--accent, #C9A84C); }
  .ref-previews { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .ref-preview { position: relative; width: 64px; height: 64px; border-radius: 6px; overflow: hidden; border: 1px solid var(--divider, #333); }
  .ref-preview img { width: 100%; height: 100%; object-fit: cover; }
  .ref-preview-remove { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: rgba(0,0,0,0.7); color: #fff; border: none; border-radius: 50%; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }

    .datetime-section { margin-bottom: 24px; padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--border,#333); border-radius: 4px; }
    .datetime-label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim,#999); margin-bottom: 12px; }
    .datetime-row { display: flex; gap: 16px; }
    .datetime-row .form-group { margin-bottom: 0; flex: 1; }
    .busy-slot { display: inline-block; background: rgba(200,50,50,0.15); color: #ff6b6b; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin: 2px 4px 2px 0; }
    .avail-ok { color: var(--gold,#C9A84C); }
    .avail-closed { color: #ff6b6b; }
    input[type="date"], input[type="time"] { color-scheme: dark; }
    @media (max-width: 600px) { .datetime-row { flex-direction: column; gap: 12px; } }
  
    .cal-wrap { flex: 1.4; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .cal-header span { font-size: 0.85rem; font-weight: 600; color: var(--white,#fff); }
    .cal-header button { background: none; border: 1px solid var(--border,#333); color: var(--dim,#999); width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s; }
    .cal-header button:hover { border-color: var(--gold,#C9A84C); color: var(--gold,#C9A84C); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
    .cal-grid .cal-dow { font-size: 0.6rem; color: var(--dim,#999); text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 0; }
    .cal-grid .cal-day { padding: 7px 0; font-size: 0.8rem; border-radius: 4px; cursor: pointer; color: var(--white,#fff); transition: all 0.15s; border: 1px solid transparent; }
    .cal-grid .cal-day:hover:not(.cal-disabled):not(.cal-selected) { background: rgba(255,255,255,0.06); border-color: var(--border,#333); }
    .cal-grid .cal-day.cal-selected { background: var(--gold,#C9A84C); color: #000; font-weight: 600; }
    .cal-grid .cal-day.cal-disabled { color: var(--border,#333); cursor: default; }
    .cal-grid .cal-day.cal-today:not(.cal-selected) { border-color: var(--gold,#C9A84C); }
    .cal-grid .cal-day.cal-empty { cursor: default; }
    .cal-selected-display { margin-top: 8px; font-size: 0.82rem; color: var(--gold,#C9A84C); }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav scrolled">
    <div class="container">
      <a href="index.html" class="nav-logo">TABS</a>
      <button class="nav-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="tattoos.html">Tattoos</a></li>
        <li><a href="booking.html" class="active">Booking</a></li>
        
      </ul>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="container">
      <span class="section-label">Let's Work</span>
      <h1>Book a Session</h1>
      <p>Custom pieces &amp; flash deals — fill out the form to get started</p>
    </div>
  </div>

  <!-- Booking Content -->
  <section class="section">
    <div class="container">
      <div class="booking-grid">

        <!-- Form -->
        <div class="fade-up">
          <form onsubmit="handleBooking(event)">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000">
            </div>
            <div class="form-group">
              <label for="instagram">Instagram Handle</label>
              <input type="text" id="instagram" name="instagram" placeholder="@yourhandle">
            </div>
            <div class="form-group">
              <label for="type">Session Type</label>
              <select id="type" name="type" required>
                <option value="" disabled selected>Select one</option>
                <option value="custom">Custom Piece</option>
                <option value="flash">Flash Design</option>
                <option value="coverup">Cover-Up</option>
                <option value="consultation">Consultation Only</option>
              </select>
            </div>
            <div class="form-group">
              <label for="placement">Placement &amp; Size</label>
              <input type="text" id="placement" name="placement" placeholder="e.g. Inner forearm, ~6 inches">
            </div>
            <div class="form-group">
              <label for="description">Tell Me About Your Idea</label>
              <textarea id="description" name="description" placeholder="Describe the piece you want — reference images, characters, style notes, vibes. The more detail the better." required></textarea>
            </div>
            
            <div class="form-group">
              <label>Reference Photos <span style="font-weight:300;color:var(--muted,#999);font-size:0.8rem;">(optional, up to 5)</span></label>
              <div class="ref-upload">
                <label class="ref-upload-label" for="ref-photos">+ Add Photos</label>
                <input type="file" id="ref-photos" accept="image/*" multiple style="display:none;" onchange="handleRefPhotos(this)">
              </div>
              <div id="ref-previews" class="ref-previews"></div>
            </div>
            <div class="datetime-section">
            <p class="datetime-label">Preferred Date &amp; Time (optional)</p>
            <div class="datetime-row">
              <div class="cal-wrap">
                <input type="hidden" name="requestedDate" id="reqDate">
                <div id="calWidget"></div>
              </div>
              <div class="form-group" style="flex:0.6;min-width:100px;">
                <label>Time</label>
                <input type="time" name="requestedTime" id="reqTime" disabled>
                <div id="availInfo" style="display:none;margin-top:8px;font-size:0.82rem;"></div>
              </div>
            </div>
          </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-logo">TABS</div>
        <ul class="footer-links">
          <li><a href="https://instagram.com/tabs___" target="_blank" rel="noopener">Instagram</a></li>
          <li><a href="booking.html">Book</a></li>
          <li><a href="tattoos.html">Gallery</a></li>
        </ul>
      </div>
      <div class="footer-bottom">
        <p>Powered by <a href="https://eternowebstudio.com" target="_blank" rel="noopener">Eterno Web Studio</a></p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>


<script>
(function(){
  var hidden=document.getElementById('reqDate');
  var timeInput=document.getElementById('reqTime');
  var availInfo=document.getElementById('availInfo');
  var container=document.getElementById('calWidget');
  if(!hidden||!container)return;
  var today=new Date();today.setHours(0,0,0,0);
  var vY=today.getFullYear(),vM=today.getMonth(),sel=null;
  var DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];
  var MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
  function pad(n){return n<10?'0'+n:''+n;}
  function fmt(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}
  function render(){
    var f=new Date(vY,vM,1),sd=f.getDay(),dim=new Date(vY,vM+1,0).getDate();
    var h='<div class="cal-header"><button type="button" onclick="window.__calPrev()">&#8249;</button><span>'+MO[vM]+' '+vY+'</span><button type="button" onclick="window.__calNext()">&#8250;</button></div><div class="cal-grid">';
    DAYS.forEach(function(d){h+='<div class="cal-dow">'+d+'</div>';});
    for(var i=0;i<sd;i++)h+='<div class="cal-day cal-empty"></div>';
    for(var d=1;d<=dim;d++){
      var ds=fmt(vY,vM,d),dO=new Date(vY,vM,d),past=dO<today,isT=dO.getTime()===today.getTime(),isS=sel===ds;
      var c='cal-day';if(past)c+=' cal-disabled';if(isT)c+=' cal-today';if(isS)c+=' cal-selected';
      h+=past?'<div class="'+c+'">'+d+'</div>':'<div class="'+c+'" onclick="window.__calPick(\''+ds+'\')">'+d+'</div>';
    }
    h+='</div>';if(sel)h+='<div class="cal-selected-display">'+sel+'</div>';
    container.innerHTML=h;
  }
  window.__calPrev=function(){vM--;if(vM<0){vM=11;vY--;}if(vY<today.getFullYear()||(vY===today.getFullYear()&&vM<today.getMonth())){vM=today.getMonth();vY=today.getFullYear();}render();};
  window.__calNext=function(){vM++;if(vM>11){vM=0;vY++;}var mx=new Date(today);mx.setMonth(mx.getMonth()+6);if(vY>mx.getFullYear()||(vY===mx.getFullYear()&&vM>mx.getMonth())){vM=mx.getMonth();vY=mx.getFullYear();}render();};
  window.__calPick=async function(ds){
    sel=ds;hidden.value=ds;render();
    timeInput.disabled=true;timeInput.value='';
    availInfo.style.display='block';availInfo.innerHTML='<span style="color:var(--dim,#999)">Checking...</span>';
    try{
      var r=await fetch('https://curious-lemming-262.convex.site/api/booking/availability?slug=tabs&date='+ds);
      var data=await r.json();
      if(!data.available){availInfo.innerHTML='<span class="avail-closed">'+(data.reason==='past'?'Past date':'Closed')+'</span>';return;}
      timeInput.disabled=false;timeInput.setAttribute('min',data.workingHours.start);timeInput.setAttribute('max',data.workingHours.end);
      var info='<span class="avail-ok">'+data.workingHours.start+' - '+data.workingHours.end+'</span>';
      if(data.busySlots&&data.busySlots.length>0){info+='<br><span style="font-size:0.72rem;color:var(--dim,#999)">Booked:</span>';data.busySlots.forEach(function(s){info+=' <span class="busy-slot">'+s.start+'-'+s.end+'</span>';});}
      if(data.fullDayBlocked){info='<span class="avail-closed">Fully booked</span>';timeInput.disabled=true;}
      availInfo.innerHTML=info;
    }catch(e){availInfo.innerHTML='';timeInput.disabled=false;}
  };
  render();
})();
</script>
</body>
</html>
